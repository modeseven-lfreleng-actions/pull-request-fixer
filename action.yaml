# pull-request-fixer
name: "🛠️ Pull Request Fixer"
description: "Fix pull requests with GitHub integration"
# Any relevant notes/observations can go here

inputs:
  input:
    description: "Description of input"
    required: true

outputs:
  output:
    description: "Description of output"
    value: ${{ steps.code.outputs.output }}

runs:
  using: "composite"
  steps:
    - name: "Friendly Name"
      id: code
      shell: bash
      env:
        INPUT_INPUT: ${{ inputs.input }}
      run: |
        # Friendly Name
        input="$INPUT_INPUT"
        if [ -z "$input" ]; then
          echo "Error: mandatory input was not set/configured ❌"
          exit 1
        fi

        # Emit via the documented multiline-delimiter form so a value
        # containing newlines cannot append additional output keys
        # (output-injection hardening).
        delimiter="ghadelimiter_${RANDOM}${RANDOM}${RANDOM}"
        {
          printf '%s<<%s\n' "output" "$delimiter"
          printf '%s\n' "$input"
          printf '%s\n' "$delimiter"
        } >> "$GITHUB_OUTPUT"
        echo "Action received: $input ✅"
        echo "Action received: $input ✅" >> "$GITHUB_STEP_SUMMARY"
